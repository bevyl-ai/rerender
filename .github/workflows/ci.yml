name: ci

on:
  push:
    branches: [main]
  pull_request:

# Newer push to the same branch cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate: types + format + lint. No browser needed.
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Format + lint (biome)
        run: npm run check
      - name: Dead code / unused deps (knip)
        run: npm run knip
      - name: Package publish surface (publint)
        run: npm run publint

  # Proof the renderer actually works end to end: bundle -> headless chrome ->
  # frame-step capture -> WebCodecs encode -> mediabunny concat (no ffmpeg). Renders a
  # short multi-slice clip and asserts a real mp4 came out.
  render-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install chrome-headless-shell system deps + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates fonts-liberation fonts-noto-core \
            libasound2 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 \
            libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0 libgtk-3-0 \
            libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libx11-6 libx11-xcb1 \
            libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 \
            libxkbcommon0 libxrandr2 libxrender1 libxtst6
      - name: Render a short clip (multi-slice, exercises concat)
        run: node bin/rerender.mjs render templates/helloworld/src/index.ts HelloWorld /tmp/smoke.mp4 --frames 0-29 --concurrency 2
      - name: Assert a real mp4 was produced
        run: |
          test -f /tmp/smoke.mp4
          SIZE=$(stat -c%s /tmp/smoke.mp4)
          echo "smoke.mp4: $SIZE bytes"
          test "$SIZE" -gt 10000
          # mp4 'ftyp' box must appear in the first 32 bytes
          head -c 32 /tmp/smoke.mp4 | grep -q ftyp
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-clip
          path: /tmp/smoke.mp4
          if-no-files-found: ignore

  # Proof the NO-server, in-browser export works end to end: builds the demo, drives the real
  # "Export this to MP4" flow in full Chrome (the client export decodes footage with WebCodecs,
  # which chrome-headless-shell can't), and asserts the exported mp4 actually contains the
  # footage. Guards the opaque-root-background regression that silently hides the <Video>.
  export-smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install Chrome system deps + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates fonts-liberation fonts-noto-core \
            libasound2 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 libcairo2 libcups2 \
            libdbus-1-3 libexpat1 libfontconfig1 libgbm1 libglib2.0-0 libgtk-3-0 \
            libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 libx11-6 libx11-xcb1 \
            libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 \
            libxkbcommon0 libxrandr2 libxrender1 libxtst6
      - name: Build demo + assert the export renders the footage
        run: npm test
