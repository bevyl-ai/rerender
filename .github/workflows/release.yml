# Publishes to npm on every v* tag push, after re-running the fast verification gate.
#
# Auth, in order of preference:
#  1. Trusted publishing (OIDC, zero secrets): configure this repo + workflow as a
#     trusted publisher in the package's npmjs.com settings (available after the
#     first publish). npm >=11.5 exchanges the id-token automatically; provenance
#     is implied.
#  2. NPM_TOKEN repo secret (granular automation token): used when set; required
#     for the very first publish, before trusted publishing can be configured.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm provenance + OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'
      # setup-node's bundled npm predates OIDC trusted publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Verify
        run: npm run typecheck && npm run check && npm run test:extract && npm run build:lib && npm run publint && npm run attw
      - name: Tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "tag $GITHUB_REF_NAME does not match package version v$PKG_VERSION"
            exit 1
          fi
      - name: Publish (prepack builds dist + runs the license guard)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
